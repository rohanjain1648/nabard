services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
    environment:
      - DATABASE_URL=sqlite:////app/data/cashflow.db

  web:
    build: ./apps/web
    ports:
      - "8080:80"
    depends_on:
      - api
